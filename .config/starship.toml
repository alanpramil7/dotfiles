#format = """
#[в•ӯв”Җuserв”Җв”Җв”ҖвқҜ](bold blue) $username
#[в”Јв”Җsystemв”ҖвқҜ](bold yellow) $hostname
#[в”Јв”ҖprojectвқҜ](bold red) $directory$rust$git_branch$git_status$package$golang$terraform$docker_context$python$docker_context$nodejs
#[в•°в”Җcmdв”Җв”Җв”Җв”ҖвқҜ](bold green)
#"""
[username]
style_user = "green bold"
style_root = "red bold"
format = "[$user]($style) "
disabled = false
show_always = true

# [hostname]
# ssh_only = false
# format = 'on [MacBook-Pro-14](bold yellow) '
# trim_at = "."
# disabled = false

# Replace the "вқҜ" symbol in the prompt with "вһң"
[character]                            # The name of the module we are configuring is "character"
success_symbol = "[вһң](bold green)"     # The "success_symbol" segment is being set to "вһң" with the color "bold green"
error_symbol = "[вң—](bold red)"
# п”¶ п”ҙ
# configure directory
[directory]
read_only = " п Ҫ"
truncation_length = 10
truncate_to_repo = true # truncates directory to root folder if in github repo
# style = "bold italic blue"

[git_status]
conflicted = "вҡ”пёҸ "
ahead = "рҹҸҺпёҸ рҹ’Ё Г—${count}"
behind = "рҹҗў Г—${count}"
diverged = "рҹ”ұ рҹҸҺпёҸ рҹ’Ё Г—${ahead_count} рҹҗў Г—${behind_count}"
untracked = "рҹӣӨпёҸ  Г—${count}"
stashed = "рҹ“Ұ "
modified = "рҹ“қ Г—${count}"
staged = "рҹ—ғпёҸ  Г—${count}"
renamed = "рҹ“ӣ Г—${count}"
deleted = "рҹ—‘пёҸ  Г—${count}"
style = "bright-white"
format = "$all_status$ahead_behind"

# [cmd_duration]
# min_time = 4
# show_milliseconds = false
# disabled = false
# style = "bold italic red"

[aws]
symbol = "оҢҪ  "

[conda]
symbol = "п„Ң "

[dart]
symbol = "оһҳ "

#[directory]
#read_only = " п Ҫ"

[docker_context]
symbol = "пҢҲ "
format = "via [$symbol$context]($style) "
style = "blue bold"
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]
detect_folders = []
disabled = false

[elixir]
symbol = "оүө "

[elm]
symbol = "оҳ¬ "

[git_branch]
symbol = "пҗҳ "

[golang]
symbol = "оҳ§ "

[hg_branch]
symbol = "пҗҳ "

[java]
symbol = "оү– "

[julia]
symbol = "оҳӨ "

[memory_usage]
symbol = "пЎҡ "

[nim]
symbol = "пҡӨ "

[nix_shell]
symbol = "пӢң "

[package]
symbol = "пЈ– "

[perl]
symbol = "оқ© "

[php]
